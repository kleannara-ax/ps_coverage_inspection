# ============================================================
# module-jri 모듈 설정
# company-platform 통합 시 application.yml에 추가할 내용
#
# 주의: 이 파일은 참조용입니다.
# 실제로는 core 모듈의 application.yml에 설정이 통합됩니다.
# JPA Entity Scan 범위에 com.company.module.jri 가 포함되어야 합니다.
# ============================================================

# ─── 아래 내용을 core 의 application.yml 에 병합하세요 ───

# JRI 모듈 설정
# jri:
#   upload:
#     dir: ./uploads/jri          # 이미지 저장 경로

# spring.jpa.hibernate.ddl-auto 가 none 또는 validate 이면
# DB 마이그레이션 SQL을 먼저 실행해야 합니다:
# src/main/resources/db/migration/V1__mod_jri_init_schema.sql

# 로깅 설정 (core application.yml에 추가)
# logging:
#   level:
#     com.company.module.jri: DEBUG
